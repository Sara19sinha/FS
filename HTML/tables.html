<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table,th,td{
            border: 1px solid black;
            border-collapse: collapse;

        }
        td,th{
            padding: 10px;
        }

        th{
            background-color: coral;
        }

        td{
            background-color: aquamarine;
        }
    </style>
</head>
<body>

    <center>

    <table>
        <tr>
            <th colspan="7">Time Table</th>
        </tr>
        <tr>
            <th>Time/Days</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
        </tr>
        <tr>
            <th>10:00</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
            <td>DB</td>
        </tr>
            <tr>
            <th>11:00</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
            <td>DB</td>
        </tr>
        <tr>
            <th>12:00</th>
            <th colspan="6">Long Recess</th>
        </tr>
            <tr>
            <th>1:00</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
            <td rowspan="2">DB</td>
        </tr>
            <tr>
            <th>2:00</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
        </tr>
        <tr>
            <th>3:00</th>
            <th colspan="6">Short Recess</th>
        </tr>
            <tr>
            <th>3:15</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
        </tr>
            <tr>
            <th>4:30</th>
            <td>NodeJs</td>
            <td>HTML</td>
            <td>CSS</td>
            <td>JS</td>
            <td>React</td>
        </tr>
    </table>
    </center>

</body>
</html>
